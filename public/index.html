<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irish Rovers Treasure Hunt Tick-List </title>
    <link rel="stylesheet" href="theme.css?v=0.1">
    
</head>
    <body>
        <div class="logo-container">
            <img src="images/black_logo_tran.png" alt="LIRTH Logo" id="main-logo">
        </div>
        <div id="auth-container">
            <div id="auth-message" style="color: #1A531A; font-weight: bold; margin-bottom: 10px;"></div>
            <div id="login-view">
                <h2 id="login-greeting">Welcome</h2>
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-password" placeholder="Password">
                <button id="login-btn">Login</button>
                <p>Don't have an account? <a href="#" id="go-to-signup">Sign Up here</a></p>
            </div>

            <div id="signup-view" style="display: none;">
                <h2>Create Your Account</h2>
                <div class="input-group">
                    <!-- label for="reg-first-name">First Name</label -->
                    <input type="text" id="reg-first-name" placeholder="Enter your first name">
                </div>
                <input type="email" id="signup-email" placeholder="Email">
                <input type="password" id="signup-password" placeholder="Password">
                <button id="signup-btn">Create Account</button>
                <p>Already have an account? <a href="#" id="go-to-login">Login here</a></p>
            </div>
        </div>

        <div id="app-container" style="display: none;">
            <div class="app-header">
                <h2 id="welcome-user">Welcome!</h2> <button id="logout-btn">Logout</button>
            </div>
        
            <div id="congrats-msg" style="display: none;">
                🎉 Hunt Completed! You've found everything!
            </div>
        
            <div id="user-task-list"></div>
        </div>

        <script type="module" src="app.js?v=1.6"></script>
    </body>
</html>
