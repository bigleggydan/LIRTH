<!DOCTYPE html>
<html>
<head>
    <title>Rovers Kit Order</title>
    <link rel="stylesheet" href="theme.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-container">
                <a href="/">
                    <img src="/images/black_logo_tran.png" alt="Rovers Logo" id="main-logo">
                </a>
            </div>
            <h1>Kit Order Portal</h1>
        </header>
        <form id="order-form">
            <input type="text" id="order-name" placeholder="Your Name" required>

            <div id="image-display" style="text-align: center; margin-bottom: 20px;">
                <img id="kit-preview" src="" alt="Kit Preview" style="display: none; max-width: 200px; border-radius: 8px; border: 2px solid #1A531A;">
            </div>

            <div id="kit-choices-group">
                <label for="kit-choices">Kit available:</label>
                <select id="kit-choices">
                    <option value="" disabled selected>Choose your kit</option>
                    <option value="greent">Green T-Shirt</option>
                    <option value="whitet">White T-Shirt</option>
                    <option value="longwhitet">Long Sleeve White</option>
                    <option value="longblackt">Long Sleeve Black</option>
                    <option value="hybrid">Hybrid Top</option>
                    <option value="lshooded">Long Sleeved Hooded top</option>
                    <option value="leggings">Leggings</option>
                    <option value="polos">Polo Shirt</option>
                    <option value="tShirt">Cotton T Shirt</option>
                </select>
            </div>

            <label for="gender">Category:</label>
            <select id="gender" required>
                <option value="" disabled selected>Male/Female</option>
                <option value="male">Mens / Unisex</option>
                <option value="female">Ladies Fit</option>
            </select>

            <div id="male-sizes-group">
                <label for="male-size">Size (Mens):</label>
                <select id="male-size">
                    <option value="" disabled selected>Size</option>
                    <option value="S">Small</option>
                    <option value="M">Medium</option>
                    <option value="L">Large</option>
                    <option value="XL">XL</option>
                    <option value="XXL">XXL</option>
                </select>
            </div>

            <div id="female-sizes-group" style="display: none;">
                <label for="female-size">Size (Ladies):</label>
                <select id="female-size">
                    <option value="" disabled selected>Size</option>
                    <option value="8">UK 8</option>
                    <option value="10">UK 10</option>
                    <option value="12">UK 12</option>
                    <option value="14">UK 14</option>
                    <option value="16">UK 16</option>
                </select>
            </div>

            <button type="submit">Place Order</button>
        </form>
    </div>

    <script type="module" src="kit.js"></script>
</body>
</html>
